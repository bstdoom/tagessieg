# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_run:
    workflows: ["Import Match", "Build Native Binary"]
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore native binary cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/tagessieg/tagessieg
          key: ${{ runner.os }}-${{ runner.arch }}-tagessieg-native-${{ hashFiles('build.gradle.kts', 'settings.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'src/main/**') }}
          fail-on-cache-miss: true

      - name: Prepare Temp Directory
        run: |
          chmod +x .cache/tagessieg/tagessieg
          ./.cache/tagessieg/tagessieg -w ./temp init
          touch ./temp/.nojekyll
          touch ./temp/index.html

      - name: Generate Reveal
        run: |
          ./.cache/tagessieg/tagessieg -w ./temp reveal

      - name: Generate Tabler
        run: |
          ./.cache/tagessieg/tagessieg -w ./temp tabler

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload temp directory
          path: './temp'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
