name: Build Native Binary

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".java-version"
      - ".github/workflows/**"
      - "gradle.properties"
      - "gradle/**"
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore native binary cache
        id: native-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/tagessieg/tagessieg
          key: ${{ runner.os }}-${{ runner.arch }}-tagessieg-native-${{ hashFiles('.java-version', 'build.gradle.kts', 'settings.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties', 'src/main/**') }}

      - name: Set up GraalVM from .java-version
        uses: actions/setup-java@v5
        with:
          distribution: "graalvm"
          java-version-file: ".java-version"
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build and verify project
        run: ./gradlew build

      - name: Build native executable
        if: steps.native-cache-restore.outputs.cache-hit != 'true'
        run: ./gradlew nativeCompile

      - name: Stage native executable for cache consumers
        if: steps.native-cache-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/tagessieg
          cp build/native/nativeCompile/tagessieg .cache/tagessieg/tagessieg
          chmod +x .cache/tagessieg/tagessieg

      - name: Save native binary cache
        if: steps.native-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/tagessieg/tagessieg
          key: ${{ steps.native-cache-restore.outputs.cache-primary-key }}

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tagessieg-native-${{ runner.os }}-${{ runner.arch }}
          path: .cache/tagessieg/tagessieg
          if-no-files-found: error
